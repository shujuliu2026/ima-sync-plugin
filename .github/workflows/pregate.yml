# IMA Sync · 独立仓库 pregate
# Phase 2 · IMA-P2 · 与 wikimap .github/workflows/ima-sync.yml 对齐

name: Pregate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ima-sync-pregate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pregate:
    name: Pregate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm run pregate
        run: npm run pregate
